<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 560" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <!-- Center gradient -->
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <!-- Node gradients — each node gets its own color -->
    <linearGradient id="node1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7"/>
      <stop offset="100%" style="stop-color:#FDE68A"/>
    </linearGradient>
    <linearGradient id="node2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DBEAFE"/>
      <stop offset="100%" style="stop-color:#BFDBFE"/>
    </linearGradient>
    <linearGradient id="node3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E7FF"/>
      <stop offset="100%" style="stop-color:#C7D2FE"/>
    </linearGradient>
    <linearGradient id="node4Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D1FAE5"/>
      <stop offset="100%" style="stop-color:#A7F3D0"/>
    </linearGradient>
    <linearGradient id="node5Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCE7F3"/>
      <stop offset="100%" style="stop-color:#FBCFE8"/>
    </linearGradient>
    <!-- Cycle arc gradient -->
    <linearGradient id="cycleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94A3B8"/>
      <stop offset="100%" style="stop-color:#CBD5E1"/>
    </linearGradient>
    <!-- Radial line gradients per node color -->
    <linearGradient id="rad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="rad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="rad3" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="rad4" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="rad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.5"/>
    </linearGradient>
    <!-- Arrows -->
    <marker id="arrowCycle" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M 0,0 L 7,2.5 L 0,5 Z" fill="#94A3B8"/>
    </marker>
    <marker id="arrowIn1" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M 0,0 L 6,2 L 0,4 Z" fill="#B45309" opacity="0.85"/>
    </marker>
    <marker id="arrowIn2" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M 0,0 L 6,2 L 0,4 Z" fill="#3B82F6" opacity="0.5"/>
    </marker>
    <marker id="arrowIn3" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M 0,0 L 6,2 L 0,4 Z" fill="#6366F1" opacity="0.5"/>
    </marker>
    <marker id="arrowIn4" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M 0,0 L 6,2 L 0,4 Z" fill="#10B981" opacity="0.5"/>
    </marker>
    <marker id="arrowIn5" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M 0,0 L 6,2 L 0,4 Z" fill="#EC4899" opacity="0.5"/>
    </marker>
    <!-- Center glow -->
    <filter id="centerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="10" flood-color="#A78BFA" flood-opacity="0.25"/>
    </filter>
    <!-- Node shadows -->
    <filter id="nodeShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Soft radial background glow -->
  <circle cx="280" cy="255" r="220" fill="url(#centerGrad)" opacity="0.03"/>

  <!-- Subtle circle guide -->
  <circle cx="280" cy="255" r="180" fill="none" stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="2,5" opacity="0.4"/>

  <!-- Colored radial lines INTO center -->
  <line x1="280" y1="98" x2="280" y2="225" stroke="#B45309" stroke-width="1.5" stroke-dasharray="4,3" stroke-opacity="0.55" marker-end="url(#arrowIn1)"/>
  <line x1="425" y1="208" x2="318" y2="248" stroke="url(#rad2)" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrowIn2)"/>
  <line x1="370" y1="388" x2="308" y2="288" stroke="url(#rad3)" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrowIn3)"/>
  <line x1="190" y1="388" x2="252" y2="288" stroke="url(#rad4)" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrowIn4)"/>
  <line x1="135" y1="208" x2="242" y2="248" stroke="url(#rad5)" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrowIn5)"/>

  <!-- Outer cycle arcs (true circular, r=180) -->
  <path d="M 332,82 A 180,180 0 0,1 442,186" fill="none" stroke="#94A3B8" stroke-width="1.3" marker-end="url(#arrowCycle)" opacity="0.6"/>
  <path d="M 456,226 A 180,180 0 0,1 396,392" fill="none" stroke="#94A3B8" stroke-width="1.3" marker-end="url(#arrowCycle)" opacity="0.6"/>
  <path d="M 354,414 A 180,180 0 0,1 200,414" fill="none" stroke="#94A3B8" stroke-width="1.3" marker-end="url(#arrowCycle)" opacity="0.6"/>
  <path d="M 156,390 A 180,180 0 0,1 112,226" fill="none" stroke="#94A3B8" stroke-width="1.3" marker-end="url(#arrowCycle)" opacity="0.6"/>
  <path d="M 118,184 A 180,180 0 0,1 228,82" fill="none" stroke="#94A3B8" stroke-width="1.3" marker-end="url(#arrowCycle)" opacity="0.6"/>

  <!-- CENTER NODE -->
  <rect x="207" y="226" width="146" height="58" rx="29" fill="url(#centerGrad)" filter="url(#centerGlow)"/>
  <text x="280" y="250" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="700">Knowledge Architecture</text>
  <text x="280" y="266" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="700">&amp; AI</text>

  <!-- OUTER NODES — colored fills with soft shadows -->

  <!-- 01 Bedside Care (warm yellow) -->
  <rect x="215" y="55" width="130" height="42" rx="21" fill="url(#node1Grad)" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.35" filter="url(#nodeShadow)"/>
  <text x="280" y="81" text-anchor="middle" fill="#92400E" font-size="11.5" font-weight="600">Bedside Care</text>

  <!-- 02 Real-World Evidence (blue) -->
  <rect x="386" y="178" width="130" height="42" rx="21" fill="url(#node2Grad)" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.35" filter="url(#nodeShadow)"/>
  <text x="451" y="196" text-anchor="middle" fill="#1E40AF" font-size="10.5" font-weight="600">Real-World</text>
  <text x="451" y="210" text-anchor="middle" fill="#1E40AF" font-size="10.5" font-weight="600">Evidence</text>

  <!-- 03 Evidence Synthesis (indigo) -->
  <rect x="321" y="383" width="130" height="42" rx="21" fill="url(#node3Grad)" stroke="#6366F1" stroke-width="1" stroke-opacity="0.35" filter="url(#nodeShadow)"/>
  <text x="386" y="401" text-anchor="middle" fill="#3730A3" font-size="10.5" font-weight="600">Evidence</text>
  <text x="386" y="415" text-anchor="middle" fill="#3730A3" font-size="10.5" font-weight="600">Synthesis</text>

  <!-- 04 Knowledge Dissemination (green) -->
  <rect x="109" y="383" width="130" height="42" rx="21" fill="url(#node4Grad)" stroke="#10B981" stroke-width="1" stroke-opacity="0.35" filter="url(#nodeShadow)"/>
  <text x="174" y="401" text-anchor="middle" fill="#065F46" font-size="10.5" font-weight="600">Knowledge</text>
  <text x="174" y="415" text-anchor="middle" fill="#065F46" font-size="10.5" font-weight="600">Dissemination</text>

  <!-- 05 Closing the Loop (pink) -->
  <rect x="44" y="178" width="130" height="42" rx="21" fill="url(#node5Grad)" stroke="#EC4899" stroke-width="1" stroke-opacity="0.35" filter="url(#nodeShadow)"/>
  <text x="109" y="195" text-anchor="middle" fill="#9D174D" font-size="10" font-weight="600">Closing the Loop</text>
  <text x="109" y="209" text-anchor="middle" fill="#9D174D" font-size="8.5" font-weight="400" opacity="0.8">Implementation Science</text>

  <!-- Phase numbers (matching node colors) -->
  <text x="208" y="68" text-anchor="middle" fill="#D97706" font-size="8.5" font-weight="600" opacity="0.7">01</text>
  <text x="380" y="191" text-anchor="middle" fill="#2563EB" font-size="8.5" font-weight="600" opacity="0.7">02</text>
  <text x="315" y="396" text-anchor="middle" fill="#4F46E5" font-size="8.5" font-weight="600" opacity="0.7">03</text>
  <text x="103" y="396" text-anchor="middle" fill="#059669" font-size="8.5" font-weight="600" opacity="0.7">04</text>
  <text x="38" y="191" text-anchor="middle" fill="#DB2777" font-size="8.5" font-weight="600" opacity="0.7">05</text>

  <!-- Publications footer -->
  <text x="280" y="472" text-anchor="middle" fill="#94A3B8" font-size="8.5" font-weight="500" letter-spacing="0.04em">SAMPLE PEER-REVIEWED PUBLICATIONS</text>
  <text x="280" y="492" text-anchor="middle" fill="#5a5a5a" font-size="8" font-style="italic">Transplantation · J Hepatology · Int J Cancer · JAMIA Open</text>
  <text x="280" y="508" text-anchor="middle" fill="#5a5a5a" font-size="8" font-style="italic">Ann Surg Oncol · Cancer Med · BMC Med Inform · Stud Health Technol Inform</text>
  <text x="280" y="530" text-anchor="middle" fill="#5a5a5a" font-size="8.5">One study reported by <tspan font-weight="600">Reuters Health</tspan></text>
</svg>